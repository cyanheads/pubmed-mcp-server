startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      MCP_TRANSPORT_TYPE:
        type: string
        enum: ['stdio', 'http']
        default: 'stdio'
        description: "MCP communication transport ('stdio' or 'http')."
      MCP_HTTP_PORT:
        type: integer
        default: 3010
        description: "HTTP server port (if MCP_TRANSPORT_TYPE is 'http')."
      MCP_LOG_LEVEL:
        type: string
        default: 'info'
        description: 'Minimum logging level.'
      NCBI_API_KEY:
        type: string
        description: "NCBI API key for higher rate limits."
      NCBI_ADMIN_EMAIL:
        type: string
        description: "Contact email sent with NCBI requests."
  commandFunction: |
    (config) => ({
      "command": "bunx",
      "args": ["@cyanheads/pubmed-mcp-server"],
      "env": {
        "MCP_TRANSPORT_TYPE": config.MCP_TRANSPORT_TYPE,
        "MCP_HTTP_PORT": config.MCP_HTTP_PORT,
        "MCP_LOG_LEVEL": config.MCP_LOG_LEVEL
      }
    })
